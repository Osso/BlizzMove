name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends subversion
          svn export https://repos.wowace.com/wow/ace3/trunk/LibStub Libs/LibStub
          svn export https://repos.wowace.com/wow/ace3/trunk/CallbackHandler-1.0 Libs/CallbackHandler-1.0
          svn export https://repos.wowace.com/wow/ace3/trunk/AceAddon-3.0 Libs/AceAddon-3.0
          svn export https://repos.wowace.com/wow/ace3/trunk/AceConsole-3.0 Libs/AceConsole-3.0
          svn export https://repos.wowace.com/wow/ace3/trunk/AceEvent-3.0 Libs/AceEvent-3.0
          svn export https://repos.wowace.com/wow/ace3/trunk/AceHook-3.0 Libs/AceHook-3.0
          svn export https://repos.wowace.com/wow/ace3/trunk/AceGUI-3.0 Libs/AceGUI-3.0
          svn export https://repos.wowace.com/wow/ace3/trunk/AceConfig-3.0 Libs/AceConfig-3.0
          svn export https://repos.wowace.com/wow/ace3/trunk/AceLocale-3.0 Libs/AceLocale-3.0

      - uses: osso/wow-ui-sim@v1
        with:
          addon: BlizzMove
